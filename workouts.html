<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrenamiento Pro - Teacher Ivan Lifestyle</title>
    <meta name="theme-color" content="#2D6A4F">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-green: #2D6A4F;
            --light-green: #A2D9A9;
            --bg-beige: #E6F0EA;
            --text-dark: #333333;
            --text-gray: #7D7D7D;
            --card-bg: #FFFFFF;
            --accent-gold: #E9C46A;
            --timer-bg: #1b4332;
        }

        body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Quicksand', sans-serif; background-color: var(--bg-beige); }

        .background-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.12; background-image: radial-gradient(var(--primary-green) 1.5px, transparent 1.5px), linear-gradient(45deg, #f0fdf4 25%, transparent 25%, transparent 75%, #f0fdf4 75%, #f0fdf4 100%); background-size: 60px 60px; }
        .app-container { padding: 20px 20px 140px 20px; max-width: 600px; margin: 0 auto; }

        /* --- HEADER --- */
        .header { margin-bottom: 20px; padding-top: 10px; display: flex; justify-content: space-between; align-items: flex-start; }
        .header-text h1 { font-size: 1.6rem; color: var(--primary-green); margin: 0; font-weight: 700; }
        .badge { padding: 4px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-top: 5px; display: inline-block; }
        .badge-level { background: var(--primary-green); color: white; }
        .btn-finish { background: var(--accent-gold); color: var(--text-dark); border: none; padding: 10px 15px; border-radius: 15px; font-weight: 700; cursor: pointer; font-family: 'Quicksand'; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* --- LISTA DE EJERCICIOS --- */
        .exercise-list { display: flex; flex-direction: column; gap: 20px; }
        .exercise-card { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
        
        .exercise-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .exercise-name { font-size: 1.1rem; font-weight: 700; color: var(--text-dark); margin: 0; }
        .btn-video { background: var(--bg-beige); border: none; width: 30px; height: 30px; border-radius: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1rem; color: var(--primary-green); }

        /* --- TABLA DE SERIES (SETS) TIPO HEVY --- */
        .set-table { width: 100%; border-collapse: collapse; text-align: center; }
        .set-header { font-size: 0.7rem; color: var(--text-gray); text-transform: uppercase; font-weight: 700; border-bottom: 2px solid var(--bg-beige); }
        .set-header th { padding-bottom: 8px; }
        
        .set-row { transition: background-color 0.3s; }
        .set-row td { padding: 10px 2px; border-bottom: 1px solid #f9f9f9; vertical-align: middle; }
        
        .set-number { font-size: 0.85rem; font-weight: 700; color: var(--text-gray); background: var(--bg-beige); width: 24px; height: 24px; display: inline-flex; justify-content: center; align-items: center; border-radius: 6px; }
        .set-prev { font-size: 0.75rem; color: #aaa; font-weight: 600; white-space: nowrap; }
        
        .set-input { width: 45px; padding: 8px 4px; border-radius: 8px; border: 1px solid #ddd; text-align: center; font-family: 'Quicksand'; font-size: 0.95rem; font-weight: 600; background: #fafafa; outline: none; }
        .set-input:focus { border-color: var(--primary-green); background: white; }
        .input-rpe { width: 35px; background: #fff0db; border-color: #fbd6a9; color: #d97706; } /* Naranja suave para RPE */

        .btn-check { width: 28px; height: 28px; border-radius: 8px; border: 2px solid #ddd; background: white; cursor: pointer; display: inline-flex; justify-content: center; align-items: center; transition: all 0.2s; }
        .btn-check.completed { background: var(--primary-green); border-color: var(--primary-green); }
        .btn-check.completed::after { content: "✓"; color: white; font-weight: bold; font-size: 14px; }
        
        .set-row.completed-row { background-color: rgba(162, 217, 169, 0.1); }
        .set-row.completed-row .set-input { opacity: 0.7; pointer-events: none; }

        .btn-add-set { background: none; border: none; color: var(--primary-green); font-weight: 700; font-size: 0.85rem; margin-top: 15px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* --- REST TIMER (FLOTANTE) --- */
        .rest-timer-bar { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(150%); width: 90%; max-width: 500px; background: var(--timer-bg); color: white; border-radius: 20px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 90; box-sizing: border-box; }
        .rest-timer-bar.active { transform: translateX(-50%) translateY(0); }
        .timer-display { font-size: 1.8rem; font-weight: 700; font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 10px; }
        .timer-controls { display: flex; gap: 10px; }
        .btn-timer { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 10px; font-weight: 700; cursor: pointer; font-family: 'Quicksand'; }
        .btn-timer-skip { background: var(--accent-gold); color: var(--text-dark); }

        /* Loader */
        .loader { width: 30px; height: 30px; border: 4px solid var(--light-green); border-top: 4px solid var(--primary-green); border-radius: 50%; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- NAVEGACIÓN INFERIOR --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #FFFFFF; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); display: flex; justify-content: space-between; padding: 15px 10px 20px 10px; box-sizing: border-box; z-index: 100; border-radius: 30px 30px 0 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); text-decoration: none; font-size: 0.7rem; font-weight: 700; gap: 5px; flex: 1; text-align: center; }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; }
        .nav-item.active { color: var(--primary-green); }
    </style>
</head>
<body>

    <div class="background-pattern"></div>

    <div class="app-container">
        
        <header class="header">
            <div class="header-text">
                <h1 id="routineTitle">Cargando...</h1>
                <span class="badge badge-level" id="levelBadge">Nivel</span>
            </div>
            <button class="btn-finish" onclick="finishWorkout()">Finalizar</button>
        </header>

        <div id="loading" class="loader"></div>

        <!-- LISTA DE EJERCICIOS Y SERIES -->
        <div class="exercise-list" id="exerciseContainer">
            <!-- Inyectado por JS -->
        </div>

    </div>

    <!-- TEMPORIZADOR DE DESCANSO FLOTANTE -->
    <div class="rest-timer-bar" id="restTimerBar">
        <div class="timer-display">
            ⏱️ <span id="timeText">01:00</span>
        </div>
        <div class="timer-controls">
            <button class="btn-timer" onclick="adjustTime(-15)">-15s</button>
            <button class="btn-timer" onclick="adjustTime(15)">+15s</button>
            <button class="btn-timer btn-timer-skip" onclick="skipTimer()">Saltar</button>
        </div>
    </div>

    <!-- MENÚ INFERIOR -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</a>
        <a class="nav-item active"><svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z"/></svg>Rutinas</a>
        <a href="nutrition.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M15.06 11.06L16.12 10 15 8.88C13.88 7.75 13.88 5.92 15 4.79C12.44 5.39 10.45 7.42 10.05 10H10C8.9 10 8 10.9 8 12C8 13.1 8.9 14 10 14H10.05C10.45 16.58 12.44 18.61 15 19.21C13.88 18.08 13.88 16.25 15 15.12L16.12 14 15.06 12.94C14.54 12.42 14.54 11.58 15.06 11.06M20 12C20 16.42 16.42 20 12 20C7.58 20 4 16.42 4 12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z"/></svg>Dieta</a>
        <a href="habits.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.11 0 2-.9 2-2V5c0-1.1-.89-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>Hábitos</a>
        <a href="profile.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Perfil</a>
    </nav>

    <script>
        const STATE_KEY = 'teacherIvanData';
        let appState = JSON.parse(localStorage.getItem(STATE_KEY));
        
        // Base de datos Ficticia para simular el "Historial de Pesos" (En un futuro vendría de la pestaña LOGS)
        const mockHistoryLogs = {
            "Sentadillas": "60kg x 10",
            "Press de banca": "50kg x 8",
            "Peso muerto rumano": "70kg x 12"
        };

        window.onload = () => {
            if (!appState || !appState.rutinaGuardada) {
                // Si no hay rutina guardada (entró directo), simulamos una básica
                appState = { 
                    user: { plan: 'free' }, 
                    rutinaGuardada: { NOMBRE_RUTINA: 'Día de Pierna', NIVEL: 'Intermedio', LISTA_EJERCICIOS: 'Sentadillas - Peso muerto rumano - Zancadas' } 
                };
            }
            renderWorkout(appState.rutinaGuardada);
        };

        function renderWorkout(rutina) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('routineTitle').innerText = rutina.NOMBRE_RUTINA;
            document.getElementById('levelBadge').innerText = rutina.NIVEL;

            const container = document.getElementById('exerciseContainer');
            container.innerHTML = '';

            const ejercicios = rutina.LISTA_EJERCICIOS.split('-').map(n => n.trim());

            ejercicios.forEach((nombre, exIndex) => {
                // Buscamos si hay historial previo para este ejercicio
                const prevLog = mockHistoryLogs[nombre] || "-";

                // Creamos 3 series por defecto para la UI
                let setsHTML = '';
                for(let s = 1; s <= 3; s++) {
                    setsHTML += `
                        <tr class="set-row" id="row-${exIndex}-${s}">
                            <td><span class="set-number">${s}</span></td>
                            <td class="set-prev">${prevLog}</td>
                            <td><input type="number" class="set-input" placeholder="kg"></td>
                            <td><input type="number" class="set-input" placeholder="reps"></td>
                            <td><input type="number" class="set-input input-rpe" placeholder="RPE" min="1" max="10"></td>
                            <td><button class="btn-check" onclick="toggleSet(this, ${exIndex}, ${s})"></button></td>
                        </tr>
                    `;
                }

                container.innerHTML += `
                    <div class="exercise-card">
                        <div class="exercise-header">
                            <h3 class="exercise-name">${nombre}</h3>
                            <button class="btn-video" title="Ver técnica">▶️</button>
                        </div>
                        <table class="set-table">
                            <thead>
                                <tr class="set-header">
                                    <th>Set</th>
                                    <th>Anterior</th>
                                    <th>kg</th>
                                    <th>Reps</th>
                                    <th>RPE</th>
                                    <th>✔️</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-${exIndex}">
                                ${setsHTML}
                            </tbody>
                        </table>
                        <button class="btn-add-set" onclick="addSet(${exIndex}, '${prevLog}')">+ Añadir Serie</button>
                    </div>
                `;
            });
        }

        // --- LÓGICA DE SERIES (SETS) ---
        function toggleSet(btn, exIndex, setNum) {
            const row = document.getElementById(`row-${exIndex}-${setNum}`);
            const inputs = row.querySelectorAll('input');
            
            // Validar que haya llenado Reps o Kg antes de marcar (opcional, pero buena práctica)
            if(!btn.classList.contains('completed') && inputs[1].value === "") {
                inputs[1].focus();
                return; // Evita marcar si no puso repeticiones
            }

            btn.classList.toggle('completed');
            row.classList.toggle('completed-row');

            // Si se acaba de completar, disparar temporizador
            if (btn.classList.contains('completed')) {
                startRestTimer(60); // 60 segundos por defecto
            }
        }

        function addSet(exIndex, prevLog) {
            const tbody = document.getElementById(`tbody-${exIndex}`);
            const currentSets = tbody.querySelectorAll('tr').length;
            const newSetNum = currentSets + 1;

            const tr = document.createElement('tr');
            tr.className = 'set-row';
            tr.id = `row-${exIndex}-${newSetNum}`;
            tr.innerHTML = `
                <td><span class="set-number">${newSetNum}</span></td>
                <td class="set-prev">${prevLog}</td>
                <td><input type="number" class="set-input" placeholder="kg"></td>
                <td><input type="number" class="set-input" placeholder="reps"></td>
                <td><input type="number" class="set-input input-rpe" placeholder="RPE"></td>
                <td><button class="btn-check" onclick="toggleSet(this, ${exIndex}, ${newSetNum})"></button></td>
            `;
            tbody.appendChild(tr);
        }

        // --- LÓGICA DEL TEMPORIZADOR DE DESCANSO ---
        let timerInterval;
        let timeRemaining = 0;
        const timerBar = document.getElementById('restTimerBar');
        const timeText = document.getElementById('timeText');

        function startRestTimer(seconds) {
            clearInterval(timerInterval);
            timeRemaining = seconds;
            updateTimerUI();
            
            timerBar.classList.add('active'); // Mostrar barra flotante
            
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerUI();
                
                if (timeRemaining <= 0) {
                    skipTimer();
                    // Opcional: Sonido o vibración nativa del celular
                    if ("vibrate" in navigator) navigator.vibrate([200, 100, 200]);
                }
            }, 1000);
        }

        function updateTimerUI() {
            const mins = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const secs = (timeRemaining % 60).toString().padStart(2, '0');
            timeText.innerText = `${mins}:${secs}`;
        }

        function adjustTime(seconds) {
            timeRemaining += seconds;
            if (timeRemaining < 0) timeRemaining = 0;
            updateTimerUI();
        }

        function skipTimer() {
            clearInterval(timerInterval);
            timerBar.classList.remove('active'); // Ocultar barra flotante
        }

        function finishWorkout() {
            // Aquí en el futuro empaquetaremos todos los inputs y los enviaremos por POST a Google Sheets (Pestaña LOGS)
            if(confirm("¿Has terminado tu entrenamiento por hoy?")) {
                alert("¡Entrenamiento guardado con éxito! Gran trabajo.");
                window.location.href = 'dashboard.html';
            }
        }
    </script>
</body>
</html>
