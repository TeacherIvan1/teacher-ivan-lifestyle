<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrenamiento - Teacher Ivan Lifestyle</title>
    <meta name="theme-color" content="#2D6A4F">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-green: #2D6A4F;
            --light-green: #A2D9A9;
            --bg-beige: #E6F0EA;
            --text-dark: #333333;
            --text-gray: #7D7D7D;
            --card-bg: #FFFFFF;
            --accent-gold: #E9C46A;
        }

        body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Quicksand', sans-serif; background-color: var(--bg-beige); }

        .background-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.12; background-image: radial-gradient(var(--primary-green) 1.5px, transparent 1.5px), linear-gradient(45deg, #f0fdf4 25%, transparent 25%, transparent 75%, #f0fdf4 75%, #f0fdf4 100%); background-size: 60px 60px; }
        .app-container { padding: 20px 20px 100px 20px; max-width: 600px; margin: 0 auto; }

        /* --- HEADER --- */
        .header { margin-bottom: 20px; padding-top: 10px; }
        .header h1 { font-size: 1.8rem; color: var(--primary-green); margin: 0; font-weight: 700; }
        .routine-info { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .badge { padding: 4px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .badge-level { background: var(--primary-green); color: white; }
        .badge-vip { background: var(--accent-gold); color: var(--text-dark); }

        /* --- BUSCADOR (SOLO VIP) --- */
        #vipSearchSection { display: none; margin-bottom: 20px; animation: fadeIn 0.5s ease; }
        .search-bar { width: 100%; padding: 12px 15px; border-radius: 15px; border: 2px solid var(--light-green); font-family: 'Quicksand'; font-size: 1rem; box-sizing: border-box; outline: none; }

        /* --- LISTA DE EJERCICIOS --- */
        .exercise-list { display: flex; flex-direction: column; gap: 15px; }
        .exercise-card { background: var(--card-bg); border-radius: 25px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); position: relative; transition: transform 0.2s; }
        .exercise-card:active { transform: scale(0.98); }
        
        .exercise-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .exercise-name { font-size: 1.2rem; font-weight: 700; color: var(--text-dark); margin: 0; flex: 1; }
        
        .btn-video { background: var(--bg-beige); border: none; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }

        .exercise-details { display: flex; gap: 20px; margin-bottom: 15px; }
        .detail-item { display: flex; flex-direction: column; }
        .detail-label { font-size: 0.7rem; color: var(--text-gray); text-transform: uppercase; font-weight: 700; }
        .detail-value { font-size: 1.1rem; color: var(--primary-green); font-weight: 700; }

        /* --- BOTONES VIP DENTRO DE CARD --- */
        .vip-actions { display: none; border-top: 1px solid #f0f0f0; padding-top: 15px; justify-content: space-between; align-items: center; }
        .btn-change { background: none; border: 1.5px solid var(--accent-gold); color: var(--accent-gold); padding: 6px 12px; border-radius: 10px; font-weight: 700; font-size: 0.8rem; cursor: pointer; font-family: 'Quicksand'; }

        /* --- NAVEGACIÓN INFERIOR --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #FFFFFF; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); display: flex; justify-content: space-between; padding: 15px 10px 20px 10px; box-sizing: border-box; z-index: 100; border-radius: 30px 30px 0 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); text-decoration: none; font-size: 0.7rem; font-weight: 700; gap: 5px; flex: 1; text-align: center; }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; }
        .nav-item.active { color: var(--primary-green); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Spinner */
        .loader { width: 40px; height: 40px; border: 4px solid var(--light-green); border-top: 4px solid var(--primary-green); border-radius: 50%; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="background-pattern"></div>

    <div class="app-container">
        
        <header class="header">
            <h1 id="routineTitle">Cargando rutina...</h1>
            <div class="routine-info">
                <span class="badge badge-level" id="levelBadge">Nivel</span>
                <span class="badge badge-vip" id="vipBadge" style="display: none;">👑 VIP</span>
            </div>
        </header>

        <!-- BUSCADOR VIP (Solo aparece si es Premium) -->
        <section id="vipSearchSection">
            <input type="text" class="search-bar" placeholder="🔍 Buscar ejercicio para cambiar..." onkeyup="searchExercises(this.value)">
        </section>

        <div id="loading" class="loader"></div>

        <!-- LISTA DE EJERCICIOS -->
        <div class="exercise-list" id="exerciseContainer">
            <!-- Inyectado por JS -->
        </div>

    </div>

    <!-- MENÚ INFERIOR -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</a>
        <a class="nav-item active"><svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z"/></svg>Rutinas</a>
        <a href="nutrition.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M15.06 11.06L16.12 10 15 8.88C13.88 7.75 13.88 5.92 15 4.79C12.44 5.39 10.45 7.42 10.05 10H10C8.9 10 8 10.9 8 12C8 13.1 8.9 14 10 14H10.05C10.45 16.58 12.44 18.61 15 19.21C13.88 18.08 13.88 16.25 15 15.12L16.12 14 15.06 12.94C14.54 12.42 14.54 11.58 15.06 11.06M20 12C20 16.42 16.42 20 12 20C7.58 20 4 16.42 4 12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z"/></svg>Dieta</a>
        <a href="habits.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.11 0 2-.9 2-2V5c0-1.1-.89-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>Hábitos</a>
        <a href="profile.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Perfil</a>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxnbIBK31t3Il1JoyvIj6fSawERfBxgAJD-5ahXmZsFBKnf5RWMNy1uf1RQM36WNJJd/exec';
        const STATE_KEY = 'teacherIvanData';
        let appState = JSON.parse(localStorage.getItem(STATE_KEY));
        let allExercises = []; // Base de datos completa para VIPs

        window.onload = async () => {
            if (!appState) { window.location.href = 'index.html'; return; }

            // 1. Configurar Interfaz según Plan
            const isVIP = appState.user.plan === 'premium';
            if (isVIP) {
                document.getElementById('vipBadge').style.display = 'inline-block';
                document.getElementById('vipSearchSection').style.display = 'block';
                fetchAllExercises(); // Cargar base de datos en segundo plano
            }

            // 2. Cargar Rutina (Prioridad: Memoria -> API)
            if (appState.rutinaGuardada) {
                renderRoutine(appState.rutinaGuardada);
            } else {
                fetchDefaultRoutine();
            }
        };

        async function fetchDefaultRoutine() {
            try {
                const response = await fetch(API_URL + '?action=getRutinas');
                const rutinas = await response.json();
                let userLevel = appState.user.nivel || "Principiante";
                let rutina = rutinas.find(r => r.NIVEL.includes(userLevel)) || rutinas[0];
                
                appState.rutinaGuardada = rutina;
                localStorage.setItem(STATE_KEY, JSON.stringify(appState));
                renderRoutine(rutina);
            } catch (e) {
                console.error("Error cargando rutina");
            }
        }

        async function fetchAllExercises() {
            try {
                const response = await fetch(API_URL + '?action=getEjercicios');
                allExercises = await response.json();
            } catch (e) { console.log("Error cargando DB ejercicios"); }
        }

        function renderRoutine(rutina) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('routineTitle').innerText = rutina.NOMBRE_RUTINA;
            document.getElementById('levelBadge').innerText = rutina.NIVEL;

            const container = document.getElementById('exerciseContainer');
            container.innerHTML = '';

            // Lista de nombres de la rutina (ej: "Sentadillas - Flexiones - Plancha")
            const nombresEjercicios = rutina.LISTA_EJERCICIOS.split('-').map(n => n.trim());

            nombresEjercicios.forEach((nombre, index) => {
                // Buscamos detalles en la lista guardada o mostramos básico
                container.innerHTML += `
                    <div class="exercise-card" id="ex-${index}">
                        <div class="exercise-header">
                            <h3 class="exercise-name">${nombre}</h3>
                            <button class="btn-video" onclick="playVideo('${nombre}')">▶️</button>
                        </div>
                        <div class="exercise-details">
                            <div class="detail-item">
                                <span class="detail-label">Series</span>
                                <span class="detail-value">4</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Reps</span>
                                <span class="detail-value">12-15</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Descanso</span>
                                <span class="detail-value">60s</span>
                            </div>
                        </div>
                        <div class="vip-actions" style="display: ${appState.user.plan === 'premium' ? 'flex' : 'none'}">
                            <span style="font-size: 0.7rem; color: var(--text-gray);">¿No te gusta?</span>
                            <button class="btn-change" onclick="triggerSwap(${index})">🔄 Intercambiar</button>
                        </div>
                    </div>
                `;
            });
        }

        function playVideo(nombre) {
            alert("Reproduciendo técnica de: " + nombre + "\n(Aquí se abriría el link de YouTube de tu Sheet1)");
        }

        // --- LÓGICA VIP: INTERCAMBIAR EJERCICIOS ---
        let currentSwapIndex = null;

        function triggerSwap(index) {
            currentSwapIndex = index;
            document.querySelector('.search-bar').focus();
            document.querySelector('.search-bar').style.borderColor = 'var(--accent-gold)';
            alert("Selecciona un ejercicio de la lista o busca uno nuevo para reemplazar.");
        }

        function searchExercises(query) {
            if (!query || query.length < 2) return;
            // Aquí se podría mostrar una lista desplegable de resultados de allExercises
            console.log("Buscando en DB:", query);
        }

        // Esta función simula el intercambio (Para que el VIP vea el poder de su cuenta)
        function finalizeSwap(newExerciseName) {
            if(currentSwapIndex === null) return;
            
            let nombres = appState.rutinaGuardada.LISTA_EJERCICIOS.split('-').map(n => n.trim());
            nombres[currentSwapIndex] = newExerciseName;
            
            appState.rutinaGuardada.LISTA_EJERCICIOS = nombres.join(' - ');
            localStorage.setItem(STATE_KEY, JSON.stringify(appState));
            renderRoutine(appState.rutinaGuardada);
            alert("¡Ejercicio actualizado!");
        }

    </script>
</body>
</html>
