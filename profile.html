<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfil - Teacher Ivan Lifestyle</title>
    <meta name="theme-color" content="#2D6A4F">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- ESTILOS GENERALES --- */
        :root {
            --primary-green: #2D6A4F;
            --light-green: #A2D9A9;
            --bg-beige: #E6F0EA;
            --text-dark: #333333;
            --text-gray: #7D7D7D;
            --card-bg: #FFFFFF;
            --accent-gold: #F4A261;
            --danger-red: #E76F51;
        }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-beige);
            -webkit-tap-highlight-color: transparent;
        }

        /* --- PATRÓN DE FONDO "HEALTHY" --- */
        .background-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.12;
            background-image: 
                radial-gradient(var(--primary-green) 1.5px, transparent 1.5px),
                linear-gradient(45deg, #f0fdf4 25%, transparent 25%, transparent 75%, #f0fdf4 75%, #f0fdf4 100%),
                linear-gradient(45deg, #f0fdf4 25%, transparent 25%, transparent 75%, #f0fdf4 75%, #f0fdf4 100%),
                linear-gradient(135deg, #f0fdf4 25%, transparent 25%, transparent 75%, #f0fdf4 75%, #f0fdf4 100%);
            background-size: 60px 60px;
            background-position: 0 0, 0 0, 30px 30px, 30px 30px;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .app-container {
            padding: 20px 20px 100px 20px;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- HEADER Y PERFIL --- */
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-top: 20px;
        }

        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 15px auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            background-color: var(--light-green);
            border-radius: 50%;
            border: 4px solid #FFF;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            overflow: hidden;
        }

        /* Badge flotante sobre el avatar */
        .badge-premium {
            position: absolute;
            bottom: 0;
            right: 0;
            background-color: var(--accent-gold);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #FFF;
            font-size: 1rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .user-name {
            font-size: 1.6rem;
            color: var(--primary-green);
            margin: 0 0 5px 0;
            font-weight: 700;
        }

        .user-email {
            color: var(--text-gray);
            margin: 0;
            font-size: 0.95rem;
        }

        /* --- ESTADÍSTICAS (GRID) --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-green);
            margin-bottom: 5px;
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-gray);
            font-weight: 600;
            text-transform: uppercase;
        }

        /* --- MENÚ DE OPCIONES --- */
        .settings-card {
            background-color: var(--card-bg);
            border-radius: 25px;
            padding: 10px 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            margin-bottom: 25px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-dark);
            transition: opacity 0.2s;
        }

        .setting-item:active {
            opacity: 0.6;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .setting-icon {
            width: 35px;
            height: 35px;
            background-color: var(--bg-beige);
            color: var(--primary-green);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .setting-icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .setting-text {
            font-weight: 600;
            font-size: 1rem;
        }

        .setting-right {
            color: #ccc;
        }

        .setting-right svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Toggle Switch (Interruptor) */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-green);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* --- BOTÓN CERRAR SESIÓN --- */
        .btn-logout {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            background-color: transparent;
            color: var(--danger-red);
            border: 2px solid var(--danger-red);
            font-family: 'Quicksand', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-logout:active {
            background-color: var(--danger-red);
            color: white;
        }

        /* --- NAVEGACIÓN INFERIOR --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #FFFFFF;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 0 20px 0;
            z-index: 100;
            border-radius: 30px 30px 0 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            gap: 5px;
            transition: color 0.2s;
            cursor: pointer;
        }

        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }
        .nav-item.active { color: var(--primary-green); }

    </style>
</head>
<body>
