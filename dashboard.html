<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Teacher Ivan Lifestyle</title>
    <meta name="theme-color" content="#2D6A4F">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- ESTILOS GENERALES --- */
        :root {
            --primary-green: #2D6A4F;
            --light-green: #A2D9A9;
            --bg-beige: #E6F0EA;
            --text-dark: #333333;
            --text-gray: #7D7D7D;
            --card-bg: #FFFFFF;
            --accent-orange: #F4A261;
            --accent-gold: #E9C46A;
        }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-beige);
            -webkit-tap-highlight-color: transparent;
        }

        /* --- PATRÓN DE FONDO "HEALTHY" --- */
        .background-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.12;
            background-image: 
                radial-gradient(var(--primary-green) 1.5px, transparent 1.5px),
                linear-gradient(45deg, #f0fdf4 25%, transparent 25%, transparent 75%, #f0fdf4 75%, #f0fdf4 100%);
            background-size: 60px 60px;
        }

        .app-container { padding: 20px 20px 100px 20px; max-width: 600px; margin: 0 auto; }

        /* --- HEADER Y AVATAR --- */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-top: 10px; }
        .header-text h1 { font-size: 1.6rem; color: var(--primary-green); margin: 0; font-weight: 700; }
        .header-text p { color: var(--text-gray); margin: 2px 0 0 0; font-size: 0.9rem; font-weight: 600; display:flex; align-items:center; gap:5px;}
        
        .avatar {
            width: 55px; height: 55px; background-color: var(--light-green); border-radius: 50%;
            border: 3px solid #FFF; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex;
            justify-content: center; align-items: center; font-size: 1.8rem; cursor: pointer;
            transition: transform 0.2s; position: relative;
        }
        .avatar:active { transform: scale(0.9); }
        .avatar-edit-icon {
            position: absolute; bottom: -2px; right: -2px; background: var(--primary-green);
            color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 10px;
            display: flex; justify-content: center; align-items: center; border: 2px solid white;
        }

        /* --- BOTÓN DE NOTIFICACIONES --- */
        .btn-notify {
            background: rgba(244, 162, 97, 0.2); color: var(--accent-orange); border: none;
            padding: 4px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; cursor: pointer;
        }

        /* --- TARJETAS --- */
        .card { background-color: var(--card-bg); border-radius: 25px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); margin-bottom: 20px; }
        .section-title { font-size: 1.2rem; color: var(--text-dark); margin: 0 0 15px 0; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }

        /* Progreso */
        .progress-card { background: linear-gradient(135deg, var(--primary-green), #1b4332); color: white; }
        .progress-card h2 { margin: 0 0 5px 0; font-size: 1.2rem; }
        .progress-card p { margin: 0 0 15px 0; font-size: 0.9rem; opacity: 0.8; }
        .progress-bar-bg { background-color: rgba(255,255,255,0.2); height: 10px; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { background-color: var(--accent-orange); height: 100%; width: 0%; transition: width 0.4s ease; }

        /* Rutina (Bloqueo VIP) */
        .workout-hero { background-color: var(--bg-beige); border-radius: 15px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        .workout-icon { width: 50px; height: 50px; background-color: white; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; }
        .workout-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: var(--text-dark); }
        .btn-start-workout { background-color: var(--primary-green); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 15px; font-size: 1rem; }
        
        .btn-customize {
            background-color: transparent; color: var(--accent-gold); border: 2px solid var(--accent-gold);
            padding: 8px 15px; border-radius: 20px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; font-size: 0.9rem;
            display: flex; justify-content: center; align-items: center; gap: 5px;
        }

        /* Hábitos */
        .habit-list { display: flex; flex-direction: column; }
        .habit-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .habit-item:last-child { border-bottom: none; }
        .habit-icon { font-size: 1.3rem; margin-right: 15px; background-color: var(--bg-beige); width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; border-radius: 12px; }
        .habit-text { flex-grow: 1; font-weight: 600; color: var(--text-dark); transition: color 0.3s; }
        .checkbox-round { width: 22px; height: 22px; border: 2px solid #ccc; border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: all 0.2s; }
        .habit-item.completed .checkbox-round { background-color: var(--primary-green); border-color: var(--primary-green); }
        .habit-item.completed .checkbox-round::after { content: "✓"; color: white; font-size: 14px; font-weight: bold; }
        .habit-item.completed .habit-text { color: #aaa; text-decoration: line-through; }

        .btn-add-habit { background: none; border: none; color: var(--primary-green); font-weight: 700; font-family: 'Quicksand'; cursor: pointer; padding: 10px 0 0 0; display: flex; align-items: center; gap: 5px; font-size: 0.95rem; }

        /* --- MODAL AVATARES --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            z-index: 1000; display: none; justify-content: center; align-items: flex-end; opacity: 0; transition: opacity 0.3s;
        }
        .modal-content {
            background: white; width: 100%; border-radius: 30px 30px 0 0; padding: 30px 20px 40px;
            box-sizing: border-box; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .avatar-option {
            font-size: 2.5rem; background: var(--bg-beige); border-radius: 50%; width: 60px; height: 60px;
            display: flex; justify-content: center; align-items: center; margin: 0 auto; cursor: pointer; border: 3px solid transparent;
        }
        .avatar-option.selected { border-color: var(--primary-green); background: var(--light-green); }

        /* Bottom Nav (Simplificada para el ejemplo) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #FFFFFF; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); display: flex; justify-content: space-around; padding: 15px 0 20px 0; z-index: 100; border-radius: 30px 30px 0 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); text-decoration: none; font-size: 0.75rem; font-weight: 600; gap: 5px; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }
        .nav-item.active { color: var(--primary-green); }

    </style>
</head>
<body>

    <div class="background-pattern"></div>

    <div class="app-container">
        
        <!-- HEADER -->
        <header class="header">
            <div class="header-text">
                <h1>Hola, <span id="displayUserName">Usuario</span> 👋</h1>
                <p>
                    <span id="currentDate">Cargando fecha...</span>
                    <button class="btn-notify" onclick="requestNotifications()">🔔 Activar Avisos</button>
                </p>
            </div>
            <div class="avatar" onclick="openAvatarModal()">
                <span id="displayAvatar">🧘🏻‍♂️</span>
                <div class="avatar-edit-icon">✏️</div>
            </div>
        </header>

        <!-- PROGRESO -->
        <div class="card progress-card">
            <h2>Progreso Diario</h2>
            <p id="progressText">Calculando...</p>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="mainProgress"></div>
            </div>
        </div>

        <!-- RUTINA -->
        <div class="card">
            <h2 class="section-title">Rutina Asignada <span style="font-size: 0.8rem; background: var(--bg-beige); padding: 4px 8px; border-radius: 10px;" id="planBadge">VIP</span></h2>
            
            <div class="workout-hero">
                <div class="workout-icon">🔥</div>
                <div class="workout-info">
                    <h3 id="routineName">Rutina General Día 1</h3>
                    <p style="margin: 0; font-size: 0.85rem; color: var(--text-gray);">Basada en tu nivel.</p>
                </div>
            </div>
            <button class="btn-start-workout" onclick="window.location.href='workouts.html'">EMPEZAR RUTINA</button>
            <button class="btn-customize" onclick="customizeRoutine()">
                <span>👑 Personalizar Rutina (VIP)</span>
            </button>
        </div>

        <!-- HÁBITOS -->
        <div class="card">
            <h2 class="section-title">Hábitos Diarios</h2>
            
            <div class="habit-list" id="habitContainer">
                <!-- Se inyectan con JS -->
            </div>
            
            <button class="btn-add-habit" onclick="addCustomHabit()">+ Crear Hábito Personal</button>
        </div>

    </div>

    <!-- MODAL DE AVATARES -->
    <div class="modal-overlay" id="avatarModal" onclick="closeAvatarModal(event)">
        <div class="modal-content">
            <h2 style="margin-top:0; color: var(--primary-green); text-align: center;">Elige tu Avatar</h2>
            <div class="avatar-grid">
                <div class="avatar-option" onclick="saveAvatar('🧘🏻‍♂️')">🧘🏻‍♂️</div>
                <div class="avatar-option" onclick="saveAvatar('🏋️‍♀️')">🏋️‍♀️</div>
                <div class="avatar-option" onclick="saveAvatar('🏃🏽‍♂️')">🏃🏽‍♂️</div>
                <div class="avatar-option" onclick="saveAvatar('🚴🏻')">🚴🏻</div>
                <div class="avatar-option" onclick="saveAvatar('🧗🏽‍♀️')">🧗🏽‍♀️</div>
                <div class="avatar-option" onclick="saveAvatar('🤸‍♂️')">🤸‍♂️</div>
                <div class="avatar-option" onclick="saveAvatar('🥊')">🥊</div>
                <div class="avatar-option" onclick="saveAvatar('🥑')">🥑</div>
            </div>
        </div>
    </div>

    <!-- MENÚ INFERIOR -->
    <nav class="bottom-nav">
        <a class="nav-item active"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</a>
        <a href="workouts.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z"/></svg>Rutinas</a>
        <a href="habits.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.11 0 2-.9 2-2V5c0-1.1-.89-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>Hábitos</a>
        <a href="profile.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Perfil</a>
    </nav>

    <script>
        // --- 1. MOTOR DE ESTADO GLOBAL (LOCALSTORAGE) ---
        // Sincroniza datos entre todas las pantallas de la app
        const STATE_KEY = 'teacherIvanData';
        
        let appState = JSON.parse(localStorage.getItem(STATE_KEY)) || {
            user: { nombre: 'Carlos', avatar: '🧘🏻‍♂️', plan: 'premium' }, // 'free' o 'premium'
            habits: [
                { id: 1, text: 'Beber 2L de Agua', icon: '💧', done: false },
                { id: 2, text: 'Meditar 10 mins', icon: '🧘', done: false }
            ]
        };

        function saveState() {
            localStorage.setItem(STATE_KEY, JSON.stringify(appState));
            renderDashboard(); // Actualiza la UI tras guardar
        }

        // --- 2. RENDERIZADO DINÁMICO ---
        function renderDashboard() {
            // Perfil
            document.getElementById('displayUserName').innerText = appState.user.nombre;
            document.getElementById('displayAvatar').innerText = appState.user.avatar;
            document.getElementById('planBadge').innerText = appState.user.plan === 'premium' ? '👑 VIP' : 'FREE';

            // Hábitos
            const container = document.getElementById('habitContainer');
            container.innerHTML = '';
            let completedCount = 0;

            appState.habits.forEach((habit, index) => {
                if(habit.done) completedCount++;
                
                container.innerHTML += `
                    <div class="habit-item ${habit.done ? 'completed' : ''}" onclick="toggleHabit(${index})">
                        <div class="habit-icon">${habit.icon}</div>
                        <div class="habit-text">${habit.text}</div>
                        <div class="checkbox-round"></div>
                    </div>
                `;
            });

            // Progreso
            const total = appState.habits.length;
            const percentage = total === 0 ? 0 : (completedCount / total) * 100;
            document.getElementById('mainProgress').style.width = percentage + '%';
            document.getElementById('progressText').innerText = `Has completado ${completedCount} de ${total} tareas.`;
        }

        // --- 3. LÓGICA DE HÁBITOS ---
        function toggleHabit(index) {
            appState.habits[index].done = !appState.habits[index].done;
            saveState(); // Guarda en localStorage y re-renderiza
        }

        function addCustomHabit() {
            const newHabitText = prompt("Escribe tu nuevo hábito diario (Ej. Leer 5 páginas):");
            if (newHabitText && newHabitText.trim() !== "") {
                const newHabit = {
                    id: Date.now(), // ID único
                    text: newHabitText,
                    icon: '✨', // Icono genérico para personalizados
                    done: false
                };
                appState.habits.push(newHabit);
                saveState();
            }
        }

        // --- 4. AVATARES ---
        const modal = document.getElementById('avatarModal');
        
        function openAvatarModal() { modal.classList.add('active'); }
        
        function closeAvatarModal(e) { 
            if(e.target === modal) modal.classList.remove('active'); 
        }

        function saveAvatar(emoji) {
            appState.user.avatar = emoji;
            saveState();
            modal.classList.remove('active');
        }

        // --- 5. LÓGICA VIP VS FREE (RUTINAS) ---
        function customizeRoutine() {
            if (appState.user.plan === 'premium') {
                alert("¡Bienvenido al panel VIP! Abriendo la biblioteca completa para armar tu rutina...");
                window.location.href = 'workouts.html'; // Redirige a la biblioteca
            } else {
                alert("🔒 Función VIP: El plan Free incluye una rutina general. ¡Sube a Elite Premium para crear tus propias rutinas a medida!");
                window.location.href = 'auth.html'; // Redirige al Paywall
            }
        }

        // --- 6. NOTIFICACIONES PUSH (Simuladas/Browser API) ---
        function requestNotifications() {
            if (!("Notification" in window)) {
                alert("Tu navegador no soporta notificaciones.");
            } else if (Notification.permission === "granted") {
                alert("¡Las notificaciones ya están activadas! Te avisaremos para tus rutinas.");
                document.querySelector('.btn-notify').style.display = 'none';
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        new Notification("¡Teacher Ivan Lifestyle!", { body: "Te recordaremos tus hábitos diarios 💪" });
                        document.querySelector('.btn-notify').style.display = 'none';
                    }
                });
            }
        }

        // --- INICIALIZACIÓN ---
        window.onload = () => {
            // Fecha actual
            const dateStr = new Date().toLocaleDateString('es-ES', { weekday: 'long', month: 'long', day: 'numeric' });
            document.getElementById('currentDate').innerText = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            
            // Si el usuario ya dio permiso, ocultar botón
            if ("Notification" in window && Notification.permission === "granted") {
                document.querySelector('.btn-notify').style.display = 'none';
            }

            // Para pruebas: Si quieres probar el plan FREE, descomenta la siguiente línea temporalmente:
            // appState.user.plan = 'free'; localStorage.setItem(STATE_KEY, JSON.stringify(appState));

            renderDashboard(); // Dibuja la UI con los datos guardados
        };
    </script>
</body>
</html>
