<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nutrición - Teacher Ivan Lifestyle</title>
    <meta name="theme-color" content="#2D6A4F">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- ESTILOS GENERALES --- */
        :root {
            --primary-green: #2D6A4F;
            --light-green: #A2D9A9;
            --bg-beige: #E6F0EA;
            --text-dark: #333333;
            --text-gray: #7D7D7D;
            --card-bg: #FFFFFF;
            --accent-orange: #F4A261;
            --accent-red: #E76F51;
            --accent-yellow: #E9C46A;
        }

        body, html {
            margin: 0; padding: 0; min-height: 100%; font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-beige); -webkit-tap-highlight-color: transparent;
        }

        .background-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.12;
            background-image: 
                radial-gradient(var(--primary-green) 1.5px, transparent 1.5px),
                linear-gradient(45deg, #f0fdf4 25%, transparent 25%, transparent 75%, #f0fdf4 75%, #f0fdf4 100%);
            background-size: 60px 60px;
        }

        .app-container { padding: 20px 20px 100px 20px; max-width: 600px; margin: 0 auto; }

        /* --- HEADER --- */
        .header { margin-bottom: 25px; padding-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .header-text h1 { font-size: 1.8rem; color: var(--primary-green); margin: 0 0 5px 0; font-weight: 700; }
        .header-text p { color: var(--text-gray); margin: 0; font-size: 0.95rem; }

        /* --- TARJETA DE RESUMEN DE MACROS --- */
        .macros-card {
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-red));
            border-radius: 25px; padding: 20px; color: white; box-shadow: 0 8px 20px rgba(231, 111, 81, 0.2);
            margin-bottom: 25px; display: flex; flex-direction: column; gap: 15px;
        }
        .macros-header { display: flex; justify-content: space-between; align-items: flex-end; }
        .calories-title { margin: 0; font-size: 1rem; opacity: 0.9; }
        .calories-number { margin: 0; font-size: 2.2rem; font-weight: 700; line-height: 1; }
        .calories-label { font-size: 0.9rem; opacity: 0.9; }

        .macros-bars { display: flex; justify-content: space-between; gap: 10px; }
        .macro-item { flex-grow: 1; text-align: center; }
        .macro-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; opacity: 0.9;}
        .macro-value { font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; }
        .macro-progress-bg { height: 6px; background-color: rgba(255,255,255,0.3); border-radius: 10px; overflow: hidden; }
        .macro-progress-fill { height: 100%; background-color: white; border-radius: 10px; transition: width 0.5s ease; }

        /* --- PLAN DE COMIDAS (TIMELINE) --- */
        .section-title { font-size: 1.2rem; color: var(--text-dark); margin: 0 0 15px 0; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        
        .meal-list { display: flex; flex-direction: column; gap: 15px; }
        .meal-card {
            background-color: var(--card-bg); border-radius: 20px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.04);
            display: flex; align-items: stretch; gap: 15px; position: relative; overflow: hidden; transition: all 0.3s ease; cursor: pointer;
        }
        .meal-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 6px; }
        .meal-breakfast::before { background-color: var(--accent-yellow); }
        .meal-lunch::before { background-color: var(--accent-orange); }
        .meal-dinner::before { background-color: var(--primary-green); }

        .meal-icon-container { width: 60px; background-color: var(--bg-beige); border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; flex-shrink: 0; }
        .meal-emoji { font-size: 1.8rem; margin-bottom: 2px; }
        .meal-time { font-size: 0.65rem; color: var(--text-gray); font-weight: 700; }

        .meal-info { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .meal-title { font-size: 1.1rem; font-weight: 700; color: var(--text-dark); margin: 0 0 3px 0; }
        .meal-desc { font-size: 0.85rem; color: var(--text-gray); margin: 0; line-height: 1.3; }

        .meal-check { width: 30px; height: 30px; border: 2px solid #ddd; border-radius: 50%; display: flex; justify-content: center; align-items: center; align-self: center; transition: all 0.2s; }
        .meal-card.consumed .meal-check { background-color: var(--primary-green); border-color: var(--primary-green); }
        .meal-card.consumed .meal-check::after { content: "✓"; color: white; font-size: 16px; font-weight: bold; }
        .meal-card.consumed .meal-title, .meal-card.consumed .meal-desc { opacity: 0.5; text-decoration: line-through; }

        /* Loader */
        .spinner { width: 30px; height: 30px; border: 4px solid rgba(244, 162, 97, 0.2); border-top: 4px solid var(--accent-orange); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- NAVEGACIÓN INFERIOR --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #FFFFFF; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); display: flex; justify-content: space-around; padding: 15px 0 20px 0; z-index: 100; border-radius: 30px 30px 0 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); text-decoration: none; font-size: 0.75rem; font-weight: 600; gap: 5px; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }
        .nav-item.active { color: var(--accent-orange); }

    </style>
</head>
<body>

    <div class="background-pattern"></div>

    <div class="app-container">
        
        <div class="header">
            <div class="header-text">
                <h1>Tu Dieta</h1>
                <p id="dietName">Cargando tu plan...</p>
            </div>
            <div id="planBadge" style="font-size: 0.75rem; background: var(--card-bg); color: var(--accent-orange); padding: 5px 10px; border-radius: 15px; font-weight: 700; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">Calculando</div>
        </div>

        <!-- TARJETA DE MACROS -->
        <div class="macros-card">
            <div class="macros-header">
                <div>
                    <h2 class="calories-title">Meta Diaria (Estimada)</h2>
                    <p class="calories-number" id="totalKcal">2,000</p>
                </div>
                <div>
                    <span class="calories-label">kcal</span>
                </div>
            </div>
            
            <div class="macros-bars">
                <div class="macro-item">
                    <div class="macro-label">Proteína</div>
                    <div class="macro-value" id="valP">0g</div>
                    <div class="macro-progress-bg"><div class="macro-progress-fill" id="barP" style="width: 0%;"></div></div>
                </div>
                <div class="macro-item">
                    <div class="macro-label">Carbos</div>
                    <div class="macro-value" id="valC">0g</div>
                    <div class="macro-progress-bg"><div class="macro-progress-fill" id="barC" style="width: 0%;"></div></div>
                </div>
                <div class="macro-item">
                    <div class="macro-label">Grasas</div>
                    <div class="macro-value" id="valG">0g</div>
                    <div class="macro-progress-bg"><div class="macro-progress-fill" id="barG" style="width: 0%;"></div></div>
                </div>
            </div>
        </div>

        <h2 class="section-title">Comidas Sugeridas <span style="font-size: 0.8rem; font-weight: 600; color: var(--primary-green); cursor:pointer;" onclick="searchFood()">+ Buscar Alimento</span></h2>
        
        <div class="spinner" id="dietLoader"></div>

        <div class="meal-list" id="mealList">
            <!-- Las comidas se inyectarán aquí -->
        </div>

    </div>

    <!-- MENÚ INFERIOR -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</a>
        <a href="workouts.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z"/></svg>Rutinas</a>
        <a href="habits.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.11 0 2-.9 2-2V5c0-1.1-.89-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>Hábitos</a>
        <a class="nav-item active"><svg viewBox="0 0 24 24"><path d="M15.06 11.06L16.12 10 15 8.88C13.88 7.75 13.88 5.92 15 4.79C12.44 5.39 10.45 7.42 10.05 10H10C8.9 10 8 10.9 8 12C8 13.1 8.9 14 10 14H10.05C10.45 16.58 12.44 18.61 15 19.21C13.88 18.08 13.88 16.25 15 15.12L16.12 14 15.06 12.94C14.54 12.42 14.54 11.58 15.06 11.06M20 12C20 16.42 16.42 20 12 20C7.58 20 4 16.42 4 12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z"/></svg>Dieta</a>
    </nav>

    <script>
        // Tu API Maestra
        const API_URL = 'https://script.google.com/macros/s/AKfycbxnbIBK31t3Il1JoyvIj6fSawERfBxgAJD-5ahXmZsFBKnf5RUrlMNy1uf1RQM36WNJJd/exec';
        
        // Cargar datos del usuario desde LocalStorage (Configurado en Auth/Onboarding)
        const STATE_KEY = 'teacherIvanData';
        let appState = JSON.parse(localStorage.getItem(STATE_KEY)) || { user: { objetivos: 'Perder Grasa', plan: 'free' } };

        window.onload = async () => {
            const loader = document.getElementById('dietLoader');
            loader.style.display = 'block';

            // Ajuste visual según membresía
            document.getElementById('planBadge').innerText = appState.user.plan === 'premium' ? '👑 VIP' : 'FREE';

            try {
                // 1. Descargar las dietas de la base de datos
                const response = await fetch(API_URL + '?action=getDietas');
                const dietas = await response.json();
                
                // 2. Lógica de Asignación: Buscar dieta que coincida con el objetivo del usuario
                let userGoal = appState.user.objetivos || "";
                let dietaAsignada = dietas[0]; // Por defecto la primera
                
                for(let dieta of dietas) {
                    // Si el objetivo de la hoja coincide con lo que eligió el usuario en Onboarding
                    if(userGoal.includes(dieta.OBJETIVO_PRINCIPAL)) {
                        dietaAsignada = dieta;
                        break;
                    }
                }

                // 3. Renderizar la dieta en pantalla
                renderDieta(dietaAsignada);

            } catch(e) {
                console.error("Error al cargar dietas:", e);
                document.getElementById('mealList').innerHTML = '<p style="text-align:center; color: var(--danger-red);">Error de conexión. Intenta más tarde.</p>';
            } finally {
                loader.style.display = 'none';
            }
        };

        function renderDieta(dieta) {
            // Textos principales
            document.getElementById('dietName').innerText = dieta.NOMBRE_DIETA || "Plan Personalizado";
            document.getElementById('planBadge').innerText = dieta.TIPO_CALORIAS || "Mantenimiento";

            // Calculadora Matemática de Macros
            // Extraemos ej: "35/40/25" (Proteínas/Carbos/Grasas)
            const macros = dieta.MACROS_PROT_CARB_GRAS ? dieta.MACROS_PROT_CARB_GRAS.split('/') : ['30', '40', '30'];
            const pctP = parseInt(macros[0]);
            const pctC = parseInt(macros[1]);
            const pctG = parseInt(macros[2]);

            // Asumimos 2000 kcal como base estándar para el ejemplo visual
            const kcal = 2000; 
            const gramosP = Math.round((kcal * (pctP / 100)) / 4); // 4 kcal por gramo de proteina
            const gramosC = Math.round((kcal * (pctC / 100)) / 4); // 4 kcal por gramo de carbohidrato
            const gramosG = Math.round((kcal * (pctG / 100)) / 9); // 9 kcal por gramo de grasa

            // Actualizar la UI de Macros
            document.getElementById('valP').innerText = gramosP + "g";
            document.getElementById('valC').innerText = gramosC + "g";
            document.getElementById('valG').innerText = gramosG + "g";

            // Animación de las barras
            setTimeout(() => {
                document.getElementById('barP').style.width = pctP + '%';
                document.getElementById('barC').style.width = pctC + '%';
                document.getElementById('barG').style.width = pctG + '%';
            }, 100);

            // Generar la lista de comidas dinámicamente
            // MENU_EJEMPLO_RESUMEN viene como: "Huevos - Pollo - Fruta - Pescado"
            const menuCrudo = dieta.MENU_EJEMPLO_RESUMEN || "Desayuno Base - Almuerzo Base - Snack Base - Cena Base";
            const comidas = menuCrudo.split('-');
            
            const listContainer = document.getElementById('mealList');
            listContainer.innerHTML = '';

            // Configuración visual para cada momento del día
            const times = ['08:00', '13:30', '17:00', '20:30'];
            const emojis = ['🍳', '🥗', '🍎', '🐟'];
            const classes = ['meal-breakfast', 'meal-lunch', 'meal-lunch', 'meal-dinner'];

            comidas.forEach((comida, index) => {
                if(index > 3) return; // Máximo 4 comidas en la UI para no saturar
                
                listContainer.innerHTML += `
                    <div class="meal-card ${classes[index]}" onclick="toggleMeal(this)">
                        <div class="meal-icon-container">
                            <span class="meal-emoji">${emojis[index]}</span>
                            <span class="meal-time">${times[index]}</span>
                        </div>
                        <div class="meal-info">
                            <h3 class="meal-title">${comida.trim()}</h3>
                            <p class="meal-desc">${dieta.DESCRIPCION || "Sigue las porciones de tu plan."}</p>
                        </div>
                        <div class="meal-check"></div>
                    </div>
                `;
            });
        }

        // Interacción Visual: Marcar comida como consumida
        function toggleMeal(element) {
            element.classList.toggle('consumed');
        }

        function searchFood() {
            if (appState.user.plan === 'premium') {
                alert("Abriendo Base de Datos de Alimentos... (Aquí se conectaría con ?action=getComidas)");
            } else {
                alert("🔒 La base de datos de 110+ alimentos exactos es exclusiva de VIP Premium.");
                window.location.href = 'auth.html';
            }
        }
    </script>
</body>
</html>
