<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher Ivan - Lifestyle</title>
    <meta name="theme-color" content="#2D6A4F">
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* --- ESTILOS GENERALES (Móvil Primero) --- */
        :root {
            --primary-green: #2D6A4F;
            --light-green: #A2D9A9;
            --bg-beige: #E6F0EA;
            --text-dark: #333333;
            --text-gray: #7D7D7D;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-beige);
            overflow: hidden; 
            position: relative;
        }

        /* --- PATRÓN DE FONDO "HEALTHY" --- */
        .background-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.12; 
            background-image: 
                radial-gradient(var(--primary-green) 1.5px, transparent 1.5px),
                linear-gradient(45deg, #f0fdf4 25%, transparent 25%, transparent 75%, #f0fdf4 75%, #f0fdf4 100%),
                linear-gradient(45deg, #f0fdf4 25%, transparent 25%, transparent 75%, #f0fdf4 75%, #f0fdf4 100%),
                linear-gradient(135deg, #f0fdf4 25%, transparent 25%, transparent 75%, #f0fdf4 75%, #f0fdf4 100%);
            background-size: 60px 60px;
            background-position: 0 0, 0 0, 30px 30px, 30px 30px;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .content-wrapper {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* HEADER: Logo y Título */
        .header-logo {
            text-align: center;
            padding-top: 50px;
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary-green);
            margin: 0;
            letter-spacing: -1px;
        }

        .logo-lifestyle {
            font-size: 1rem;
            color: var(--primary-green);
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* --- CONTENEDOR DE ANIMACIÓN (Ajuste Orgánico y Máscaras) --- */
        .animation-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            width: 100%;
            margin-bottom: -20px; 
            position: relative;
            z-index: 3;
        }

        .chibi-animation-wrapper {
            width: 100%;
            max-width: 500px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chibi-animation-wrapper video {
            width: 100%;
            max-height: 45vh; 
            object-fit: contain; 
            /* Máscaras de gradiente para fundido orgánico superior e inferior */
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        }

        /* --- PANEL INFERIOR (Bottom Sheet) --- */
        .bottom-panel {
            background-color: #FFFFFF;
            width: 100%;
            padding: 40px 20px 30px 20px;
            box-sizing: border-box;
            border-radius: 40px 40px 0 0; 
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            animation: slideUp 0.8s ease-out forwards;
            transform: translateY(100%);
            z-index: 4; 
        }

        @keyframes slideUp {
            to { transform: translateY(0); }
        }

        .bottom-panel h2 {
            margin: 0 0 10px 0;
            color: var(--text-dark);
            font-size: 1.8rem;
        }

        .bottom-panel p {
            color: var(--text-gray);
            margin-bottom: 30px;
            font-size: 1rem;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- BOTONES Y SPINNER --- */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn {
            width: 90%;
            max-width: 350px;
            padding: 16px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            font-family: 'Quicksand', sans-serif;
            text-transform: uppercase;
        }

        .btn-primary {
            background-color: var(--primary-green);
            color: #FFFFFF;
        }

        .btn-primary:active {
            transform: scale(0.96);
            background-color: #245A42;
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
            display: none; 
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-outline:active {
            background-color: var(--primary-green);
            color: white;
        }

        /* Spinner de carga para usuarios recurrentes */
        .spinner {
            width: 35px;
            height: 35px;
            border: 4px solid rgba(45, 106, 79, 0.2);
            border-top: 4px solid var(--primary-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- COPYRIGHT INFERIOR --- */
        .footer-copyright {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            z-index: 3;
            font-size: 0.75rem;
            color: var(--text-gray);
            opacity: 0.8;
            font-family: 'Quicksand', sans-serif;
        }

    </style>
</head>
<body>

    <div class="background-pattern"></div>

    <div class="content-wrapper">
        <header class="header-logo">
            <h1 class="logo-text">TEACHER IVAN</h1>
            <span class="logo-lifestyle">LIFESTYLE</span>
        </header>

        <div class="animation-container">
            <div class="chibi-animation-wrapper">
                <video autoplay loop muted playsinline>
                    <source src="Chibi_Flotante_con_Movimiento_de_Viento.mp4" type="video/mp4">
                    Tu navegador no soporta video.
                </video>
            </div>
        </div>

        <div class="bottom-panel" id="bottomPanel">
            <!-- El contenido de este panel cambiará dinámicamente con JS si el usuario ya existe -->
            <h2>BIENVENIDO</h2>
            <p>Empieza tu viaje hacia un estilo de vida más saludable.</p>
            
            <div class="btn-container">
                <button id="startButton" class="btn btn-primary">CREAR CUENTA</button>
                
                <button id="loginButton" class="btn btn-outline" style="display: flex; border: none; font-size: 0.9rem; margin-top: -5px; text-transform: none;">
                    ¿Ya tienes cuenta? Inicia sesión aquí
                </button>
                
                <button id="installAppBtn" class="btn btn-outline" style="margin-top: 10px;">
                    <svg class="icon-download" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                    </svg>
                    INSTALA NUESTRA APLICACIÓN
                </button>
            </div>
                </button>
            </div>
        </div>
    </div>

    <div class="footer-copyright">
        © 2026 Teacher Ivan Lifestyle. Todos los derechos reservados.
    </div>

    <script>
        // Lógica Principal de Redirección / Auto-Login
        document.addEventListener("DOMContentLoaded", () => {
            const STATE_KEY = 'teacherIvanData'; // La misma llave usada en el dashboard.html
            const storedData = localStorage.getItem(STATE_KEY);
            const bottomPanel = document.getElementById('bottomPanel');

            if (storedData) {
                // 1. EL USUARIO YA EXISTE EN LA MEMORIA DEL CELULAR
                // Cambiamos el contenido del panel por un mensaje de carga
                bottomPanel.innerHTML = `
                    <h2>¡Qué bueno verte!</h2>
                    <p>Preparando tu plan de hoy...</p>
                    <div class="spinner"></div>
                `;
                
                // Redirigimos al dashboard automáticamente tras 1.5 segundos
                // (Mantenemos un pequeño retraso para que vea la animación y se sienta natural)
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } else {
                // 2. ES UN USUARIO NUEVO
                // Activamos la lógica normal del botón "Comenzar"
                const startBtn = document.getElementById('startButton');
                if(startBtn) {
                    startBtn.addEventListener('click', () => {
                        bottomPanel.style.transform = 'translateY(100%)';
                        bottomPanel.style.transition = 'transform 0.4s ease-in';
                        setTimeout(() => { window.location.href = 'onboarding.html'; }, 400);
                    });
                }

                // Lógica para Instalar la WebApp (PWA) solo para usuarios nuevos en esta pantalla
                let deferredPrompt;
                const installBtn = document.getElementById('installAppBtn');

                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    if(installBtn) installBtn.style.display = 'flex';
                });

                if(installBtn) {
                    installBtn.addEventListener('click', async () => {
                        if (deferredPrompt !== null) {
                            deferredPrompt.prompt();
                            const { outcome } = await deferredPrompt.userChoice;
                            deferredPrompt = null;
                            installBtn.style.display = 'none';
                        }
                    });
                }
            }
        });

        // Registro del Service Worker para funcionamiento offline/PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .catch(error => console.log('Error PWA:', error));
            });
        }
    </script>

</body>
</html>
